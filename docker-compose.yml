version: '3.8'

services:
  # 1. Database Service (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: trackforce_db
    restart: always
    environment:
      POSTGRES_USER: trackforce_user
      POSTGRES_PASSWORD: trackforce_password
      POSTGRES_DB: trackforce_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Backend Service (Node.js)
  backend:
    build: ./backend
    container_name: trackforce_backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://trackforce_user:trackforce_password@db:5432/trackforce_db
      PORT: 5000

  # 3. Frontend Service (React + Nginx)
  frontend:
    build: ./frontend
    container_name: trackforce_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:

